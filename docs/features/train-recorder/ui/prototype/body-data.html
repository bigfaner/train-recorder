<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>身体数据 - Train Recorder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ---------- Latest Data Card ---------- */
    .latest-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: var(--shadow-md);
      margin-bottom: 16px;
    }
    .latest-card .latest-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .latest-card .latest-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .latest-card .latest-date {
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .latest-card .latest-value-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .latest-card .latest-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 48px;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .latest-card .latest-unit {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .latest-card .latest-change {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 15px;
      font-weight: 600;
      margin-top: 6px;
      color: var(--success);
    }
    .latest-card .latest-change svg {
      width: 16px;
      height: 16px;
    }

    /* ---------- Trend Chart ---------- */
    .trend-chart-container {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }
    .trend-chart-container .chart-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .trend-chart-container svg {
      width: 100%;
      display: block;
    }

    /* ---------- History List ---------- */
    .history-list {
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      position: relative;
    }
    .history-row:not(:last-child)::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 16px;
      right: 0;
      height: 0.5px;
      background: rgba(0,0,0,0.08);
    }
    .history-row .history-date {
      font-size: 15px;
      color: var(--text-secondary);
    }
    .history-row .history-value {
      font-size: 17px;
      font-weight: 600;
    }
    .history-row .history-delta {
      font-size: 13px;
      font-weight: 500;
      margin-left: 8px;
    }
    .history-row .history-delta.down { color: var(--success); }
    .history-row .history-delta.up { color: var(--error); }
    .history-row .history-delta.neutral { color: var(--text-tertiary); }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="app-container">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect x="0" y="5" width="3" height="7" rx="0.5" fill="#1d1d1f"/>
          <rect x="4.5" y="3" width="3" height="9" rx="0.5" fill="#1d1d1f"/>
          <rect x="9" y="1" width="3" height="11" rx="0.5" fill="#1d1d1f"/>
          <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#1d1d1f"/>
        </svg>
        <svg width="15" height="12" viewBox="0 0 15 12" fill="none">
          <path d="M7.5 3.6C9.32 3.6 10.97 4.32 12.18 5.5L13.6 4.08C12.02 2.54 9.88 1.6 7.5 1.6C5.12 1.6 2.98 2.54 1.4 4.08L2.82 5.5C4.03 4.32 5.68 3.6 7.5 3.6Z" fill="#1d1d1f"/>
          <path d="M7.5 6.8C8.62 6.8 9.63 7.22 10.38 7.9L11.8 6.48C10.68 5.44 9.17 4.8 7.5 4.8C5.83 4.8 4.32 5.44 3.2 6.48L4.62 7.9C5.37 7.22 6.38 6.8 7.5 6.8Z" fill="#1d1d1f"/>
          <circle cx="7.5" cy="10.5" r="1.5" fill="#1d1d1f"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="2" stroke="#1d1d1f" stroke-opacity="0.35"/>
          <rect x="22" y="4" width="2" height="4" rx="0.5" fill="#1d1d1f" fill-opacity="0.35"/>
          <rect x="2" y="2" width="15" height="8" rx="1" fill="#1d1d1f"/>
        </svg>
      </span>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
      <div style="width:60px"></div>
      <span class="nav-title">身体数据</span>
      <button class="nav-action" style="font-size:15px;font-weight:500;">编辑</button>
    </div>

    <!-- Page Content -->
    <div class="page-content" style="padding-top:12px;">

      <!-- Latest Data Card -->
      <div class="latest-card fade-in">
        <div class="latest-header">
          <span class="latest-label">最新体重</span>
          <span class="latest-date">5月5日 记录</span>
        </div>
        <div class="latest-value-row">
          <span class="latest-value">75.5</span>
          <span class="latest-unit">kg</span>
        </div>
        <div class="latest-change">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
          0.3 kg
        </div>
      </div>

      <!-- Record Button -->
      <button class="btn-primary mb-16" onclick="showToast('记录页面（原型演示）')">记录数据</button>

      <!-- Segmented Control -->
      <div class="segmented">
        <div class="seg-option active" data-target="panel-trend">趋势图</div>
        <div class="seg-option" data-target="panel-history">历史记录</div>
      </div>

      <!-- Trend Chart Panel -->
      <div class="tab-panel" id="panel-trend">
        <div class="trend-chart-container">
          <div class="chart-title">体重趋势</div>
          <svg viewBox="0 0 340 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Grid lines -->
            <line x1="40" y1="20" x2="330" y2="20" class="chart-grid"/>
            <line x1="40" y1="60" x2="330" y2="60" class="chart-grid"/>
            <line x1="40" y1="100" x2="330" y2="100" class="chart-grid"/>
            <line x1="40" y1="140" x2="330" y2="140" class="chart-grid"/>

            <!-- Y-axis labels -->
            <text x="32" y="24" class="chart-label" text-anchor="end">76.5</text>
            <text x="32" y="64" class="chart-label" text-anchor="end">76.0</text>
            <text x="32" y="104" class="chart-label" text-anchor="end">75.5</text>
            <text x="32" y="144" class="chart-label" text-anchor="end">75.0</text>

            <!-- Area fill under line -->
            <defs>
              <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#0071e3" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="#0071e3" stop-opacity="0.01"/>
              </linearGradient>
            </defs>
            <path d="M70 30 L160 50 L250 70 L320 100 L320 140 L70 140 Z" fill="url(#areaGrad)"/>

            <!-- Data line: 76.2 -> 76.0 -> 75.8 -> 75.5 -->
            <!-- Y mapping: 76.5=20, 75.0=140. So 1kg = (140-20)/1.5 = 80px -->
            <!-- 76.2 -> 20 + (76.5-76.2)*80 = 20 + 24 = 44... -->
            <!-- Let me recalculate: range 75.0 to 76.5, chart y 140 to 20 -->
            <!-- y = 140 - (val-75.0) * (120/1.5) = 140 - (val-75.0)*80 -->
            <!-- 76.2 -> 140 - 1.2*80 = 140-96 = 44 -->
            <!-- 76.0 -> 140 - 1.0*80 = 60 -->
            <!-- 75.8 -> 140 - 0.8*80 = 76 -->
            <!-- 75.5 -> 140 - 0.5*80 = 100 -->
            <polyline points="70,44 160,60 250,76 320,100" class="chart-line" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Data dots -->
            <circle cx="70" cy="44" r="5" class="chart-dot"/>
            <circle cx="160" cy="60" r="5" class="chart-dot"/>
            <circle cx="250" cy="76" r="5" class="chart-dot"/>
            <circle cx="320" cy="100" r="5" class="chart-dot"/>

            <!-- Data value labels -->
            <text x="70" y="36" class="chart-label" text-anchor="middle" font-weight="600" fill="#1d1d1f">76.2</text>
            <text x="160" y="52" class="chart-label" text-anchor="middle" font-weight="600" fill="#1d1d1f">76.0</text>
            <text x="250" y="68" class="chart-label" text-anchor="middle" font-weight="600" fill="#1d1d1f">75.8</text>
            <text x="320" y="92" class="chart-label" text-anchor="middle" font-weight="600" fill="#1d1d1f">75.5</text>

            <!-- X-axis labels -->
            <text x="70" y="168" class="chart-label" text-anchor="middle">4/14</text>
            <text x="160" y="168" class="chart-label" text-anchor="middle">4/21</text>
            <text x="250" y="168" class="chart-label" text-anchor="middle">4/28</text>
            <text x="320" y="168" class="chart-label" text-anchor="middle">5/5</text>
          </svg>
        </div>
      </div>

      <!-- History Panel -->
      <div class="tab-panel hidden" id="panel-history">
        <div class="history-list">
          <div class="history-row">
            <span class="history-date">5月5日 周一</span>
            <div>
              <span class="history-value">75.5 kg</span>
              <span class="history-delta down">-0.3</span>
            </div>
          </div>
          <div class="history-row">
            <span class="history-date">4月28日 周一</span>
            <div>
              <span class="history-value">75.8 kg</span>
              <span class="history-delta down">-0.2</span>
            </div>
          </div>
          <div class="history-row">
            <span class="history-date">4月21日 周一</span>
            <div>
              <span class="history-value">76.0 kg</span>
              <span class="history-delta down">-0.2</span>
            </div>
          </div>
          <div class="history-row">
            <span class="history-date">4月14日 周一</span>
            <div>
              <span class="history-value">76.2 kg</span>
              <span class="history-delta neutral">--</span>
            </div>
          </div>
          <div class="history-row">
            <span class="history-date">4月7日 周一</span>
            <div>
              <span class="history-value">76.4 kg</span>
              <span class="history-delta up">+0.2</span>
            </div>
          </div>
          <div class="history-row">
            <span class="history-date">3月31日 周一</span>
            <div>
              <span class="history-value">76.2 kg</span>
              <span class="history-delta down">-0.1</span>
            </div>
          </div>
        </div>
      </div>

      <div style="height: 16px;"></div>
    </div><!-- /page-content -->

    <!-- Tab Bar -->
    <div class="tab-bar">
      <a class="tab-item" href="calendar.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
        </svg>
        <span>日历</span>
      </a>
      <a class="tab-item" href="plan.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        <span>计划</span>
      </a>
      <a class="tab-item" href="history.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15 15"/>
        </svg>
        <span>历史</span>
      </a>
      <a class="tab-item active" href="body-data.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>身体</span>
      </a>
      <a class="tab-item" href="settings.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
        </svg>
        <span>设置</span>
      </a>
    </div>

  </div><!-- /app-container -->
</div><!-- /phone-frame -->

<script src="app.js"></script>
</body>
</html>
