<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>日历 - Train Recorder</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ---------- Day-detail bottom card ---------- */
    .day-detail-card {
      background: var(--surface);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.06);
      padding: 20px 16px 24px;
      flex-shrink: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      margin-top: auto;
      z-index: 10;
    }
    .day-detail-card.hidden-card {
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
      box-shadow: none;
    }
    .day-detail-card:not(.hidden-card) {
      max-height: 300px;
    }
    .day-detail-card .card-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .day-detail-card .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .day-detail-card .detail-date {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .day-detail-card .detail-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .day-detail-card .detail-title h3 {
      margin: 0;
    }
    .day-detail-card .detail-exercises {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .day-detail-card .btn-primary {
      height: 44px;
      line-height: 44px;
      font-size: 15px;
      border-radius: var(--radius-md);
    }
    /* Completed state for the start button */
    .day-detail-card .btn-completed {
      background: var(--bg-alt);
      color: var(--success);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 44px;
      border-radius: var(--radius-md);
      width: 100%;
    }
    .day-detail-card .btn-completed svg {
      width: 18px;
      height: 18px;
    }
    /* Selected day highlight ring */
    .calendar-day.selected .day-num {
      box-shadow: 0 0 0 2px var(--accent);
    }
    .calendar-day.today.selected .day-num {
      box-shadow: none;
    }
    /* Rest-day detail */
    .day-detail-card .rest-content {
      text-align: center;
      padding: 8px 0;
    }
    .day-detail-card .rest-content .rest-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .day-detail-card .rest-content p {
      color: var(--text-secondary);
      font-size: 15px;
    }
    /* Calendar day with completed indicator style override */
    .calendar-day .day-indicator.completed {
      width: 16px;
      height: 4px;
      border-radius: 2px;
    }
    .calendar-day .day-indicator.completed.push { background: var(--push-color); }
    .calendar-day .day-indicator.completed.pull { background: var(--pull-color); }
    .calendar-day .day-indicator.completed.leg  { background: var(--leg-color); }
  </style>
</head>

<script>
/* ============================================
   Calendar Page — Day Data & Interactions
   ============================================ */

// Training data for May 2026
const dayData = {

  '2026-05-07': { type: 'pull', label: '拉日', tag: 'tag-pull', exercises: '引体向上/杠铃划船/二头', status: 'planned' },
  '2026-05-09': { type: 'leg',  label: '腿日', tag: 'tag-leg',  exercises: '深蹲/腿举/腿弯举', status: 'planned' },
  '2026-05-11': { type: 'push', label: '推日', tag: 'tag-push', exercises: '卧推/推举/三头',     status: 'planned' },
  '2026-05-12': { type: 'push', label: '推日', tag: 'tag-push', exercises: '卧推/推举/三头',     status: 'planned' },
  '2026-05-13': { type: 'pull', label: '拉日', tag: 'tag-pull', exercises: '引体向上/杠铃划船/二头', status: 'planned' },
  '2026-05-15': { type: 'leg',  label: '腿日', tag: 'tag-leg',  exercises: '深蹲/腿举/腿弯举', status: 'planned' },
  '2026-05-18': { type: 'push', label: '推日', tag: 'tag-push', exercises: '卧推/推举/三头',     status: 'planned' },
  '2026-05-20': { type: 'pull', label: '拉日', tag: 'tag-pull', exercises: '引体向上/杠铃划船/二头', status: 'planned' },
  '2026-05-22': { type: 'leg',  label: '腿日', tag: 'tag-leg',  exercises: '深蹲/腿举/腿弯举', status: 'planned' },
  '2026-05-25': { type: 'push', label: '推日', tag: 'tag-push', exercises: '卧推/推举/三头',     status: 'planned' },
  '2026-05-27': { type: 'pull', label: '拉日', tag: 'tag-pull', exercises: '引体向上/杠铃划船/二头', status: 'planned' },
  '2026-05-29': { type: 'leg',  label: '腿日', tag: 'tag-leg',  exercises: '深蹲/腿举/腿弯举', status: 'planned' },
};

const weekdayNames = ['周日','周一','周二','周三','周四','周五','周六'];

/**
 * Select a calendar day and update the bottom detail card.
 */
function selectDay(el, dateStr) {
  // Remove previous selection
  document.querySelectorAll('.calendar-day.selected').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');

  const card = document.getElementById('dayDetailCard');
  const data = dayData[dateStr];

  if (!data) {
    // Rest day
    const parts = dateStr.split('-');
    const dayNum = parseInt(parts[2], 10);
    const dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, dayNum);
    const weekday = weekdayNames[dateObj.getDay()];
    document.getElementById('detailDate').textContent = '5月' + dayNum + '日 ' + weekday;
    document.getElementById('detailTag').className = 'tag tag-rest';
    document.getElementById('detailTag').textContent = '休息';
    document.getElementById('detailExercises').textContent = '今天没有训练安排';
    document.getElementById('detailBtn').className = 'hidden';
    // Remove any previous completed button
    const prevBtn = card.querySelector('.btn-completed');
    if (prevBtn) prevBtn.remove();
    // Add "记录其他运动" link for rest days
    let otherSportLink = card.querySelector('.other-sport-link');
    if (!otherSportLink) {
      otherSportLink = document.createElement('a');
      otherSportLink.className = 'other-sport-link';
      otherSportLink.href = 'other-sport.html';
      otherSportLink.textContent = '记录其他运动';
      otherSportLink.style.cssText = 'display:block;text-align:center;color:var(--accent);font-size:15px;font-weight:500;padding:8px 0;';
      card.appendChild(otherSportLink);
    }
  } else {
    const parts = dateStr.split('-');
    const dayNum = parseInt(parts[2], 10);
    const dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, dayNum);
    const weekday = weekdayNames[dateObj.getDay()];

    document.getElementById('detailDate').textContent = '5月' + dayNum + '日 ' + weekday;
    document.getElementById('detailTag').className = 'tag ' + data.tag;
    document.getElementById('detailTag').textContent = data.label;
    document.getElementById('detailExercises').textContent = data.exercises;

    // Remove "记录其他运动" link if present
    const prevLink = card.querySelector('.other-sport-link');
    if (prevLink) prevLink.remove();

    // Remove any previous completed button
    const prevBtn = card.querySelector('.btn-completed');
    if (prevBtn) prevBtn.remove();

    if (data.status === 'completed') {
      document.getElementById('detailBtn').className = 'hidden';
      const doneBtn = document.createElement('div');
      doneBtn.className = 'btn-completed';
      doneBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>已完成';
      card.appendChild(doneBtn);
    } else {
      document.getElementById('detailBtn').className = 'btn-primary';
      document.getElementById('detailBtn').textContent = '开始训练';
    }
  }

  // Show card
  card.classList.remove('hidden-card');
}

/**
 * Month navigation (visual only for prototype).
 */
function navigateMonth(dir) {
  // Prototype only supports May 2026 -- just pulse the title
  const title = document.getElementById('monthTitle');
  title.style.opacity = '0.4';
  setTimeout(() => { title.style.opacity = '1'; }, 200);
}

// Auto-select today on load
document.addEventListener('DOMContentLoaded', () => {
  const todayEl = document.querySelector('.calendar-day.today');
  if (todayEl) {
    selectDay(todayEl, '2026-05-07');
  }
});
</script>
</body>
</html>
